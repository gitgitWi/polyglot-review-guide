name: Production Release

env:
  BUILD_OUTPUT_DIR: "dist"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag prefix, for example v2026.07.06"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write
  deployments: write

jobs:
  release_production:
    name: Build and deploy production
    if: github.repository == 'gitgitWi/polyglot-review-guide'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun ci

      - name: Get Current Datetime
        if: github.event_name == 'workflow_dispatch'
        id: datetime
        run: echo "NOW=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Set Release Tag From Input
        if: github.event_name == 'workflow_dispatch'
        run: echo "TAG_NAME=${{ inputs.tag_name }}-${{ steps.datetime.outputs.NOW }}" >> "$GITHUB_ENV"

      - name: Set Release Tag From Published Release
        if: github.event_name == 'release'
        run: echo "TAG_NAME=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Typecheck
        run: bun run typecheck

      - name: Build App
        run: bun run build

      - name: Zip Artifacts
        run: zip -r "${{ env.TAG_NAME }}.zip" "${{ env.BUILD_OUTPUT_DIR }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAG_NAME }}
          path: ${{ env.TAG_NAME }}.zip

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Workers static-assets deploy; name + assets (dist) + SPA fallback come from wrangler.jsonc.
          command: deploy

      - name: Create Release Note
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          files: ${{ env.TAG_NAME }}.zip
          target_commitish: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
